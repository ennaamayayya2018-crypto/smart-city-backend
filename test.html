<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تجربة واجهة المواطن</title>
</head>
<body style="font-family: Arial; padding: 50px;">
    <h2>محاكاة واجهة المواطن</h2>
    
    <form action="http://localhost:3000/api/citoyen/nouvelle-demande" method="POST" enctype="multipart/form-data">
        
        <label>نوع الطلب:</label><br>
        <input type="text" name="type_demande" value="لوحة اشهارية"><br><br>

        <label>الاسم الكامل:</label><br>
        <input type="text" name="nom_complet" value="أحمد المواطن"><br><br>

        <label>رقم البطاقة الوطنية:</label><br>
        <input type="text" name="cin" value="AB123456"><br><br>

        <label>رقم الواتساب:</label><br>
        <input type="text" name="numero_whatsapp" value="0600000000"><br><br>

        <label>الوثيقة 1 (PDF):</label><br>
        <input type="file" name="document_1" accept="application/pdf"><br><br>

        <label>الوثيقة 2 (PDF):</label><br>
        <input type="file" name="document_2" accept="application/pdf"><br><br>

        <button type="submit" style="padding: 10px 20px; background: blue; color: white;">إرسال الطلب</button>
    </form>
</body>
</html>
