<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مصلحة التعمير - إبداء الرأي التقني</title>
    <style>
        body { font-family: Arial; padding: 40px; background-color: #f4f7f6; }
        /* لون مختلف لتمييز مصلحة التعمير */
        .card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 500px; margin: auto; border-top: 5px solid #27ae60; }
        input, select, textarea, button { width: 100%; padding: 10px; margin-top: 10px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { background-color: #27ae60; color: white; font-weight: bold; cursor: pointer; border: none; }
        button:hover { background-color: #2ecc71; }
        #resultat { padding: 15px; border-radius: 5px; margin-top: 20px; display: none; }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="text-align: center; color: #27ae60;">مصلحة التعمير - دراسة الملف</h2>
        
        <form id="avisForm">
            <label><b>رقم التتبع (Code Suivi):</b></label>
            <input type="text" id="code_suivi" required placeholder="مثال: TRK-123456789">

            <label><b>الرأي التقني الهندسي:</b></label>
            <select id="avis_technique" required>
                <option value="" disabled selected>-- اختر الرأي التقني --</option>
                <option value="retour_urb_favorable">✔️ رأي موافق (الرصيف يسمح بالاستغلال)</option>
                <option value="retour_urb_defavorable">❌ رأي غير موافق (مرفوض)</option>
            </select>

            <label><b>ملاحظات هندسية (ضرورية):</b></label>
            <textarea id="observations" rows="3" placeholder="اكتب الملاحظات التقنية أو القياسات المسموح بها..."></textarea>

            <button type="submit">إرسال الرأي للمكتب الاقتصادي 📨</button>
        </form>

        <div id="resultat"></div>
    </div>

    <script>
        document.getElementById('avisForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const code_suivi = document.getElementById('code_suivi').value;
            const avis_technique = document.getElementById('avis_technique').value;
            const observations = document.getElementById('observations').value;

            try {
                // إرسال البيانات لرابط التعمير
                const response = await fetch('http://localhost:3000/api/urbanisme/avis', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code_suivi, avis_technique, observations })
                });

                const data = await response.json();
                const divResultat = document.getElementById('resultat');
                divResultat.style.display = 'block';

                if (response.ok) {
                    divResultat.style.backgroundColor = '#d4edda';
                    divResultat.style.color = '#155724';
                    divResultat.innerHTML = `<b>نجاح:</b> ${data.message} <br> <b>الحالة الجديدة:</b> ${data.statut_actuel}`;
                } else {
                    divResultat.style.backgroundColor = '#f8d7da';
                    divResultat.style.color = '#721c24';
                    divResultat.innerHTML = `<b>خطأ:</b> ${data.message}`;
                }
            } catch (error) {
                alert('حدث خطأ في الاتصال بالخادم!');
            }
        });
    </script>
</body>
</html>
