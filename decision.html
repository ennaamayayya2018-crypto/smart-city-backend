<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>المكتب الاقتصادي - اتخاذ القرار</title>
    <style>
        body { font-family: Arial; padding: 40px; background-color: #f4f7f6; }
        .card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        input, select, textarea, button { width: 100%; padding: 10px; margin-top: 10px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { background-color: #2c3e50; color: white; font-weight: bold; cursor: pointer; border: none; }
        button:hover { background-color: #1a252f; }
        #resultat { padding: 15px; border-radius: 5px; margin-top: 20px; display: none; }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="text-align: center; color: #2c3e50;">محطة قرار المكتب الاقتصادي</h2>
        
        <form id="decisionForm">
            <label><b>رقم التتبع (Code Suivi):</b></label>
            <input type="text" id="code_suivi" required placeholder="مثال: TRK-123456789">

            <label><b>القرار الإداري:</b></label>
            <select id="nouveau_statut" required>
                <option value="" disabled selected>-- اختر القرار --</option>
                <option value="en_attente_licence">🟢 قبول: تحويل للترخيص (لوحة إشهارية)</option>
                <option value="en_attente_urbanisme">🟡 إحالة: إرسال لمصلحة التعمير (رصيف/عمود)</option>
                <option value="rejete">🔴 رفض: أرشفة وإرسال واتساب</option>
            </select>

            <label><b>ملاحظات (تُرسل للمواطن في حالة الرفض):</b></label>
            <textarea id="observations" rows="3" placeholder="اكتب سبب الرفض أو ملاحظات الإحالة..."></textarea>

            <button type="submit">تنفيذ القرار 🚀</button>
        </form>

        <div id="resultat"></div>
    </div>

    <script>
        // سحر الجافاسكريبت للتواصل مع الخادم بطريقة PUT
        document.getElementById('decisionForm').addEventListener('submit', async function(e) {
            e.preventDefault(); // منع الصفحة من إعادة التحميل

            // جمع البيانات من الاستمارة
            const code_suivi = document.getElementById('code_suivi').value;
            const nouveau_statut = document.getElementById('nouveau_statut').value;
            const observations = document.getElementById('observations').value;

            try {
                // إرسال البيانات للخادم
                const response = await fetch('http://localhost:3000/api/eco/traitement', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code_suivi, nouveau_statut, observations })
                });

                const data = await response.json();
                const divResultat = document.getElementById('resultat');
                divResultat.style.display = 'block';

                if (response.ok) {
                    divResultat.style.backgroundColor = '#d4edda';
                    divResultat.style.color = '#155724';
                    divResultat.innerHTML = `<b>نجاح:</b> ${data.message} <br> <b>الحالة الجديدة:</b> ${data.statut_actuel}`;
                } else {
                    divResultat.style.backgroundColor = '#f8d7da';
                    divResultat.style.color = '#721c24';
                    divResultat.innerHTML = `<b>خطأ:</b> ${data.message}`;
                }
            } catch (error) {
                alert('حدث خطأ في الاتصال بالخادم!');
            }
        });
    </script>
</body>
</html>
